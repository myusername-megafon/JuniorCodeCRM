<div class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <svg viewBox="0 0 56 56" fill="none">
                        <rect width="56" height="56" rx="14" fill="#0a153a" />
                        <path d="M16 40L28 14L40 40H16Z" fill="#83d4fe" />
                        <circle cx="28" cy="34" r="4" fill="#0a153a" />
                    </svg>
                </div>
                <h1 class="login-title">АРМ Директора</h1>
                <p class="login-subtitle">Юниоркод Брянск</p>
            </div>

            <form class="login-form" id="login-form">
                <div class="form-group">
                    <label class="form-label" for="login">Логин</label>
                    <div class="input-with-icon">
                        <span class="material-icons-outlined input-icon">person</span>
                        <input type="text" id="login" class="form-input" placeholder="Введите логин" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Пароль</label>
                    <div class="input-with-icon">
                        <span class="material-icons-outlined input-icon">lock</span>
                        <input type="password" id="password" class="form-input" placeholder="Введите пароль" required autocomplete="current-password">
                        <button type="button" class="password-toggle" id="password-toggle" tabindex="-1">
                            <span class="material-icons-outlined">visibility_off</span>
                        </button>
                    </div>
                </div>

                <div class="login-error" id="login-error"></div>

                <button type="submit" class="btn btn-primary login-btn" id="login-btn">
                    <span>Войти</span>
                    <span class="material-icons-outlined">arrow_forward</span>
                </button>
            </form>

            <div class="login-footer">
                <p>Автоматизированное рабочее место</p>
            </div>
        </div>
    </div>
</div>
